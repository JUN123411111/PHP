<html>
    <head>
        <!-- 設定網頁編碼為 UTF-8 -->
        <meta charset="utf-8" />
        <!-- 設定網頁標題 -->
        <title>登入範例</title>
    </head>
    <body>
        <!-- 建立登入表單，資料送至 login.php 處理 -->
        <form method=post action="login.php">
            <!-- 輸入帳號 -->
            帳號：<input type=text name="id"><br />
            <!-- 輸入密碼 -->
            密碼：<input type=password name="pwd"><p></p>
            <!-- 送出與清除按鈕 -->
            <input type=submit value="登入"> <input type=reset value="清除">
        </form>
    </body>
</html>
